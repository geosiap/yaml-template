name: 'PHPCS / PHPCBF Code Style'
description: 'Verificação de padrão de código PHP (PSR-12) com PHPCS ou PHPCBF'

inputs:
  php-version:
    description: 'Versão do PHP'
    required: false
    default: '8.2'
  php-extensions:
    description: 'Extensões PHP adicionais (separadas por vírgula)'
    required: false
    default: ''
  paths:
    description: 'Caminhos a verificar (separados por espaço, ex: "app" ou "application/_classes application/_funcoes")'
    required: true
  standard:
    description: 'Padrão de código (ex: PSR12)'
    required: false
    default: 'PSR12'
  ignore:
    description: 'Diretórios/padrões a ignorar (separados por vírgula)'
    required: false
    default: 'vendor,_vendors,_cache,_logs,storage,bootstrap/cache'
  tool:
    description: 'Ferramenta: phpcs (verificação bloqueante por padrão) ou phpcbf (relatório de correções)'
    required: false
    default: 'phpcs'
  non-blocking:
    description: 'Se true, nunca falha o job mesmo com issues (equivalente ao || true original)'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Instalar PHP ${{ inputs.php-version }} + ${{ inputs.tool }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        extensions: ${{ inputs.php-extensions }}
        tools: ${{ inputs.tool }}

    - name: ${{ inputs.tool }} — verifica padrão ${{ inputs.standard }}
      shell: bash
      run: |
        ${{ inputs.tool }} \
          --standard=${{ inputs.standard }} \
          --ignore=${{ inputs.ignore }} \
          ${{ inputs.paths }}
        TOOL_EXIT=$?

        if [ "${{ inputs.tool }}" = "phpcbf" ]; then
          echo ""
          echo "=== Violações restantes (não corrigíveis automaticamente) ==="
          phpcs \
            --standard=${{ inputs.standard }} \
            --ignore=${{ inputs.ignore }} \
            --report=full \
            ${{ inputs.paths }} || true
        fi

        if [ "${{ inputs.non-blocking }}" = "true" ]; then
          exit 0
        fi
        exit $TOOL_EXIT
