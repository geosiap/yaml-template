name: 'Trivy IaC Scan'
description: 'Scan de misconfigurações em Dockerfiles e docker-compose (modo config/IaC)'

inputs:
  severity:
    description: 'Severidades a reportar (separadas por vírgula)'
    required: false
    default: 'CRITICAL,HIGH'
  scan-path:
    description: 'Caminho a ser escaneado'
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - name: Instalar Trivy CLI
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y wget apt-transport-https gnupg
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
          | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
          | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update -qq
        sudo apt-get install -y trivy

    - name: Trivy — scan de misconfigurações (IaC/Dockerfile)
      shell: bash
      run: |
        trivy config \
          --severity "${{ inputs.severity }}" \
          --exit-code 1 \
          --format table \
          --output /tmp/trivy-iac-report.txt \
          "${{ inputs.scan-path }}"

    - name: Upload Trivy IaC Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trivy-iac-report
        path: /tmp/trivy-iac-report.txt
