name: "Build Docker Image"
description: |
  "Faz o build das imagens do Backend e Frontend"

inputs:
  registry_name:
    description: "Docker Registry"
    required: true
  project_name:
    description: "Project Name"
    required: true
  docker_login:
    description: "Docker username"
    required: true
  docker_password:
    description: "Docker password"
    required: true
  docker_back_front: 
    description: "Backend or Frontend"
    required: true
  git_branch:
    description: "Branch"
    required: true
  dockerfile_name:
    description: "Dockerfile Name"
    default: "Dockerfile"
  build:
    description: "Github build number"
  tag:
    description: "Tag da imagem. Default: latest"

runs:
  using: "composite"
  steps:
    - name: Extract tag last number
      shell: bash
      run: |
        echo "$GITHUB_REF_NAME"
        EXTRACT_LAST_NUMBER=$(echo "$GITHUB_REF_NAME" | sed 's/.*\.//')
        if [[ "${{ inputs.git_branch }}" =~ production-pessoas-v.* ]]; then
          EXTRACT_LAST_NUMBER="${EXTRACT_LAST_NUMBER}.2025"
        fi
        echo "EXTRACT_LAST_NUMBER=$EXTRACT_LAST_NUMBER" >> $GITHUB_ENV
        echo "Extract: $EXTRACT_LAST_NUMBER"
      if: ${{ inputs.docker_back_front }} == 'backend'

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v2.6.0

    - name: Docker Login
      uses: docker/login-action@v2.1.0
      with:
        username: ${{ inputs.docker_login }}
        password: ${{ inputs.docker_password }}
        logout: true

    - name: Set image tags
      shell: bash
      run: |
        # Se houver valor para docker_back_front, acrescenta hífen depois dele
        if [[ -n "${{ inputs.docker_back_front }}" ]]; then
          PREFIX="${{ inputs.docker_back_front }}-"
        else
          PREFIX=""
        fi
        
        # Branch de produção pessoas
        if [[ "${{ inputs.git_branch }}" =~ production-pessoas-v.* ]]; then
          EXTRACT_VERSION=$(echo "${{ inputs.git_branch }}" | sed 's/.*production-pessoas-//')
          TAG1="${{ inputs.registry_name }}/${{ inputs.project_name }}:${PREFIX}pessoas-latest"
          TAG2="${{ inputs.registry_name }}/${{ inputs.project_name }}:${PREFIX}pessoas-${EXTRACT_VERSION}.${{ inputs.build }}"
          echo "DOCKER_TAGS=${TAG1},${TAG2}" >> $GITHUB_ENV

        # Branch de produção normal
        elif [[ "${{ inputs.git_branch }}" =~ production-v.* ]]; then
          EXTRACT_VERSION=$(echo "${{ inputs.git_branch }}" | sed 's/.*production-//')
          TAG1="${{ inputs.registry_name }}/${{ inputs.project_name }}:${PREFIX}latest"
          TAG2="${{ inputs.registry_name }}/${{ inputs.project_name }}:${PREFIX}${EXTRACT_VERSION}.${{ inputs.build }}"
          echo "DOCKER_TAGS=${TAG1},${TAG2}" >> $GITHUB_ENV

        # Branch staging
        elif [[ "${{ inputs.git_branch }}" =~ "staging" ]]; then
          TAG1="${{ inputs.registry_name }}/${{ inputs.project_name }}:${PREFIX}staging"
          echo "DOCKER_TAGS=${TAG1}" >> $GITHUB_ENV

        # Branch pessoas
        elif [[ "${{ inputs.git_branch }}" == "pessoas" ]]; then
          TAG1="${{ inputs.registry_name }}/${{ inputs.project_name }}:${PREFIX}pessoas"
          echo "DOCKER_TAGS=${TAG1}" >> $GITHUB_ENV

        # Outras branches
        else
          TAG1="${{ inputs.registry_name }}/${{ inputs.project_name }}:${PREFIX}${{ inputs.git_branch }}"
          echo "DOCKER_TAGS=${TAG1}" >> $GITHUB_ENV
        fi
        
    - name: Print variables
      shell: bash
      run: |
        echo "---------------------------------------------------------------------------------------"
        echo "DOCKER_TAGS: $DOCKER_TAGS"
        echo "---------------------------------------------------------------------------------------"

    - name: Tree
      shell: bash
      run: ls -la
      
    - name: Show image tags
      shell: bash
      run: |
        echo "Tags que serão criadas:"
        echo "$DOCKER_TAGS" | tr ',' '\n'
        echo "---------------------------------------------------------------------------------------"

    - name: Build and push Docker
      uses: docker/build-push-action@v4.0.0
      with:
        context: .
        file: ${{ inputs.dockerfile_name }}
        build-args: |
          BUILD=${{ inputs.build }}
          RELEASE=${{ env.EXTRACT_LAST_NUMBER }}
        labels: |
          --label source-branch=${{ github.ref_name }}
          --label build-commit=${{ github.sha }}
          --label repository=${{ github.repository }}
          --label source-build=github
        tags: ${{ env.DOCKER_TAGS }}
        push: true
