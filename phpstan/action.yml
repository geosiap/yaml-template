name: 'PHPStan Static Analysis'
description: 'Análise estática PHP com PHPStan'

inputs:
  php-version:
    description: 'Versão do PHP'
    required: false
    default: '8.2'
  php-extensions:
    description: 'Extensões PHP adicionais (separadas por vírgula)'
    required: false
    default: ''
  level:
    description: 'Nível de rigor do PHPStan (0-9)'
    required: false
    default: '3'
  config:
    description: 'Arquivo de configuração do PHPStan'
    required: false
    default: 'phpstan.neon'
  paths:
    description: 'Caminhos a analisar (separados por espaço)'
    required: true
  install-composer:
    description: 'Instalar dependências via Composer antes da análise'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Instalar PHP ${{ inputs.php-version }} + PHPStan
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        extensions: ${{ inputs.php-extensions }}
        tools: phpstan

    - name: Instalar dependências via Composer
      if: ${{ inputs.install-composer == 'true' }}
      shell: bash
      run: composer install --prefer-dist --no-interaction --no-progress

    - name: PHPStan — análise estática (level ${{ inputs.level }})
      shell: bash
      run: |
        echo "Executando análise estática PHP (level ${{ inputs.level }})..."
        phpstan analyse \
          --level ${{ inputs.level }} \
          --configuration ${{ inputs.config }} \
          --error-format=json \
          ${{ inputs.paths }} \
          --no-interaction > /tmp/phpstan-report.json 2>&1
        PHPSTAN_EXIT=$?

        if [ -s /tmp/phpstan-report.json ] && jq -e '.totals' /tmp/phpstan-report.json > /dev/null 2>&1; then
          ERRORS=$(jq '.totals.errors' /tmp/phpstan-report.json)
          echo "PHPStan encontrou ${ERRORS} erro(s):"
          echo ""
          jq -r '.files | to_entries[] | .key as $file | .value.messages[] | "\($file):\(.line) — \(.message)"' \
            /tmp/phpstan-report.json 2>/dev/null
        elif [ $PHPSTAN_EXIT -ne 0 ]; then
          echo "PHPStan falhou. Saída bruta:"
          cat /tmp/phpstan-report.json
        else
          echo "Sem erros PHPStan encontrados!"
        fi

        exit $PHPSTAN_EXIT
